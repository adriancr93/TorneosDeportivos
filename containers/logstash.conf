input {
  file {
    path => "/usr/share/logstash/logs/logs.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    mode => "read"
    codec => plain { charset => "UTF-8" }
  }
}

filter {
  # El archivo contiene lineas JSON y lineas de texto plano; parseamos JSON solo cuando aplique.
  json {
    source => "message"
    skip_on_invalid_json => true
  }

  if ![level] {
    mutate { add_field => { "level" => "INFO" } }
  }

  if ![loggerName] {
    mutate { add_field => { "loggerName" => "app" } }
  }

  if ![event][original] {
    mutate { add_field => { "[event][original]" => "%{message}" } }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "torneos-logs-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
